{
  "run": {
    "id_format": "YYYYMMDD-HHMMSS-JST",
    "location": ".codex/runs/<run_id>/",
    "template_sources": [
      "template/.codex/templates/PLAN.md",
      "template/.codex/templates/TASKS.md",
      "template/.codex/templates/REPORT.md"
    ]
  },
  "progress": {
    "format": "Progress: <NN>% (<done>/<total>)",
    "include_sections": ["Now", "Discovered"],
    "exclude_sections": ["Blocked"]
  },
  "execution_mode": {
    "project_top_level_default": "safe",
    "managed_auto_net_preset": "auto-net",
    "interactive_default_preset": "safe",
    "task_default_preset": "safe",
    "requires_human_approval_for_workspace_edits_in_auto_net": false,
    "requires_human_approval_for_network_in_auto_net": false,
    "delete_is_forbidden": true,
    "deletion_candidates_are_reported_in_report_md": true
  },
  "required_files": [
    "template/AGENTS.md",
    "template/PLANS.md",
    "template/CODE_REVIEW.md",
    "template/MIGRATION.md",
    "template/codex-project.toml",
    "template/.codex/config.toml",
    "template/.codex/agents/code_researcher.toml",
    "template/.codex/agents/implementation_researcher.toml",
    "template/.codex/agents/test_investigator.toml",
    "template/.codex/requirements.toml",
    "template/.codex/hooks/pre_tool_use_policy.py",
    "template/.codex/hooks/pre_tool_use_policy.ps1",
    "template/.codex/rules-auto-net/10-auto-net-allow.rules",
    "template/.codex/rules-auto-net/20-auto-net-risky-forbidden.rules",
    "template/.codex/rules-auto-net/30-auto-net-forbidden.rules",
    "template/docs/PROJECT_CONTEXT.md",
    "template/docs/reference/codex-safety-harness.md",
    "template/docs/reference/codex-implementation-harness.md",
    "template/.codex/templates/PLAN.md",
    "template/.codex/templates/TASKS.md",
    "template/.codex/templates/REPORT.md",
    "template/scripts/init-project.ps1",
    "template/scripts/init-project.sh",
    "template/scripts/codex-task.ps1",
    "template/scripts/codex-task.sh",
    "template/scripts/codex-sandbox.ps1",
    "template/scripts/codex-sandbox.sh",
    "template/scripts/validate-output-schema.py",
    "template/.agents/skills/feature-plan/references/planning-workflow.md",
    "template/.agents/skills/code-review/references/review-workflow.md"
  ],
  "planning_reference": {
    "file": "template/.agents/skills/feature-plan/references/planning-workflow.md",
    "must_contain": [
      "repo mapping",
      "Do not use",
      "change planning",
      "Entry points",
      "Main flow",
      "Key abstractions",
      "Existing tests",
      "Safe change surface",
      "Unknowns",
      "Validation candidates",
      "Ambiguity handling",
      "mandatory-question",
      "Failure modes",
      "Report file generation policy",
      "review-only"
    ]
  },
  "review_reference": {
    "file": "template/.agents/skills/code-review/references/review-workflow.md",
    "must_contain": [
      "diff triage",
      "Do not use",
      "deep review",
      "Diff classification",
      "High-risk areas",
      "What needs deep review",
      "Potential missing tests",
      "correctness",
      "security",
      "behavioral regression",
      "maintainability",
      "Open questions",
      "Failure modes",
      "Report file generation policy",
      "review-only"
    ]
  }
}
